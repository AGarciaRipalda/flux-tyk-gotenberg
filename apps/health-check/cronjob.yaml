apiVersion: batch/v1
kind: CronJob
metadata:
  name: tyk-gotenberg-health-check
  namespace: health-check
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 120
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: health-check
              image: curlimages/curl:8.5.0
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== Tyk-Gotenberg Health Check ==="
                  echo "[1/3] Requesting API key from Tyk..."

                  KEY_RESPONSE=$(curl -s -X POST \
                    -H "x-tyk-authorization: foo" \
                    -H "Content-Type: application/json" \
                    -d '{
                      "allowance": 10,
                      "rate": 10,
                      "per": 60,
                      "expires": 300,
                      "quota_max": 10,
                      "org_id": "default",
                      "access_rights": {
                        "gotenberg-v1": {
                          "api_id": "gotenberg-v1",
                          "api_name": "Gotenberg PDF API",
                          "versions": ["Default"]
                        }
                      }
                    }' http://tyk-gateway.tyk.svc.cluster.local:8080/tyk/keys/create)

                  API_KEY=$(echo "$KEY_RESPONSE" | grep -o '"key":"[^"]*"' | head -1 | cut -d'"' -f4)

                  if [ -z "$API_KEY" ]; then
                    echo "FAIL: Could not obtain API key."
                    echo "Response was: $KEY_RESPONSE"
                    exit 1
                  fi
                  echo "OK: Got API key."

                  echo "[2/3] Requesting PDF conversion via Tyk Gateway..."

                  HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                    -X POST http://tyk-gateway.tyk.svc.cluster.local:8080/pdf/forms/chromium/convert/url \
                    -H "Authorization: $API_KEY" \
                    -F url="https://example.com")

                  echo "[3/3] Evaluating response..."

                  if [ "$HTTP_CODE" = "200" ]; then
                    echo "SUCCESS: PDF pipeline is healthy (HTTP $HTTP_CODE)."
                    exit 0
                  else
                    echo "FAIL: Expected HTTP 200, got HTTP $HTTP_CODE."
                    exit 1
                  fi
