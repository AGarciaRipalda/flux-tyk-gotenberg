apiVersion: apps/v1
kind: Deployment
metadata:
  name: tyk-redis
  namespace: tyk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tyk-redis
  template:
    metadata:
      labels:
        app: tyk-redis
    spec:
      containers:
      - name: redis
        image: redis:6-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: tyk-redis
  namespace: tyk
spec:
  selector:
    app: tyk-redis
  ports:
  - port: 6379
    targetPort: 6379
