name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test-go:
    name: Build and Test Go App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gotenberg-manager

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: apps/gotenberg-manager/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build -v ./cmd/server

      - name: Test
        run: go test -v ./...

  docker-build:
    name: Test Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Gotenberg Manager Image
        working-directory: apps/gotenberg-manager
        run: docker build -t gotenberg-manager:test .

  validate-kubernetes:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"

      - name: Validate Cluster Kustomizations
        run: |
          for dir in apps/*/; do
            if [ -f "$dir/kustomization.yaml" ]; then
              echo "Validating $dir..."
              kustomize build "$dir" > /dev/null
            fi
          done

          for dir in clusters/my-cluster/*/; do
            if [ -f "$dir/kustomization.yaml" ]; then
              echo "Validating $dir..."
              kustomize build "$dir" > /dev/null
            fi
          done
