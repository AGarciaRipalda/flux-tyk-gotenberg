name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1. Validar el código Go
  test-go:
    name: Build and Test Go App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/gotenberg-manager
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: apps/gotenberg-manager/go.sum
      - name: Install dependencies
        run: go mod download
      - name: Build
        run: go build -v ./cmd/server
      - name: Test
        run: go test -v ./...

  # 2. Validar Manifiestos de Kubernetes (Kustomize)
  validate-kubernetes:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.3.0"
      - name: Validate Cluster Kustomizations
        run: |
          # Solo valida si existe el archivo kustomization.yaml en la carpeta
          find apps/ clusters/ -name "kustomization.yaml" -execdir echo "Validating {} in $(pwd)..." \; -execdir kustomize build . > /dev/null \;

  # 3. Construir y Subir a Docker Hub (Solo en push a main)
  docker-release:
    name: Build and Push Docker Image
    needs: [test-go, validate-kubernetes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ESTO ES LO QUE HE AÑADIDO: Verifica si los secretos existen antes de fallar
      - name: Check Secrets Presence
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "::error::El secreto DOCKER_USERNAME está vacío o no existe en Settings > Secrets > Actions"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::El secreto DOCKER_PASSWORD está vacío o no existe en Settings > Secrets > Actions"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/gotenberg-manager
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gotenberg-manager:latest
            ${{ secrets.DOCKER_USERNAME }}/gotenberg-manager:${{ github.sha }}
